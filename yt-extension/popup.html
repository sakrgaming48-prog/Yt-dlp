<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>YT-dlp Helper Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h2>🚀 YT-dlp Pro</h2>
        <div class="actions">
            <button id="update-btn" title="تحديث أداة yt-dlp">🔄</button>
            <button id="open-folder-btn" title="فتح مجلد التحميلات">📂</button>
            <button id="clear-btn" title="مسح المكتمل">🧹</button>
        </div>
    </div>
    
    <div class="batch-section">
        <textarea id="batch-urls" placeholder="أدخل أكثر من رابط هنا... (رابط في كل سطر)"></textarea>
        <div class="batch-controls">
            <select id="batch-quality">
                <!-- التعديل الشكلي هنا -->
                <option value="audio">صوت فقط (M4A)</option>
                <option value="video480">فيديو 480p</option>
                <option value="video720" selected>فيديو 720p</option>
                <option value="video1080">فيديو 1080p</option>
            </select>
            <button id="batch-submit">تحميل الكل</button>
        </div>
    </div>

    <div id="queue-container">
        <p class="empty-msg">لا يوجد تحميلات حالياً 😴</p>
    </div>
    <script src="popup.js"></script>
</body>
</html>
<button id="shutdown-btn" title="إغلاق السيرفر الخفي">🔌</button>
